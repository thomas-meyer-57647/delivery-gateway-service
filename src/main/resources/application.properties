spring.application.name=delivery-gateway-service

# Disable default error page
server.error.whitelabel.enabled=false

# Database ENV overrides
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:3306}
db.name=${DB_NAME:deliveries}
db.user=${DB_USER:root}
db.password=${DB_PASSWORD:}

spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:template}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =========================
# Flyway Migrations
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================
# Security (JWT Resource Server)
# =========================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

# =========================
# OpenAPI / Swagger
# =========================
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs

# =========================
# Actuator (Health / Info)
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Logging defaults (PII-safe)
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=OFF

# =========================
# Email
# =========================
# SMTP server settings GMail
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${EMAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${EMAIL_STARTTLS:true}