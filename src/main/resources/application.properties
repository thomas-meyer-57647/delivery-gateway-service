spring.application.name=delivery-gateway-service

# Disable default error page
server.error.whitelabel.enabled=false

server.port=${SERVER_PORT:8106}

# Database configuration driven by environment variables
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:deliveries}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =========================
# Flyway Migrations
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:deliveries}
spring.flyway.user=${DB_USER:root}
spring.flyway.password=${DB_PASSWORD:}

# =========================
# Security (JWT Resource Server)
# =========================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

# =========================
# OpenAPI / Swagger
# =========================
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs

# =========================
# Actuator (Health / Info)
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# =========================
# Credits Pricing
# =========================
credits.enabled=${CREDITS_ENABLED:true}
credits.sms-cost=${SMS_COST:1}
credits.whatsapp-cost=${WHATSAPP_COST:1}
credits.email-cost=${EMAIL_COST:0}

# Logging defaults (PII-safe)
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=OFF

# =========================
# Email
# =========================
# SMTP server settings GMail
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${EMAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${EMAIL_STARTTLS:true}
